  <div class="page-hero">
    <div class="container">
      <p class="breadcrumb"><a href="index.html">首頁</a> / 營養百科</p>

      <p>了解常見營養素的功效、食物來源與建議攝取量，做出更聰明的保健選擇</p>
    </div>

  <section class="section">
    <div class="container">
      <div class="search-bar">
        <input type="search" id="nutrient-search" placeholder="搜尋營養素名稱…">
      </div>
      <div style="overflow-x:auto">
        <table class="nutrient-table" id="nutrient-table">
          <thead>
            <tr>
              <th>營養素</th>
              <th>主要功效</th>
              <th>食物來源</th>
              <th>建議攝取量</th>
            </tr>
          </thead>
          <tbody id="nutrient-body"></tbody>
        </table>
      </div>
      <div class="grid-3 mt-2">
        <div class="card feature-card">
          <div class="feature-icon">💊</div>
          <h3>維生素礦物質</h3>
          <p><a href="products.html?cat=vitamins">查看相關產品 →</a></p>
        </div>
        <div class="card feature-card">
          <div class="feature-icon">🐟</div>
          <h3>魚油與脂肪酸</h3>
          <p><a href="products.html?cat=omega">查看相關產品 →</a></p>
        </div>
        <div class="card feature-card">
          <div class="feature-icon">🦠</div>
          <h3>益生菌</h3>

  <footer class="site-footer">

  </footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    const tbody = document.getElementById("nutrient-body");

    function render(list) {
      tbody.innerHTML = list.map(n => `
        <tr>
          <td><strong>${n.name}</strong></td>
          <td>${n.role}</td>
          <td>${n.source}</td>
          <td>${n.daily}</td>
        </tr>
      `).join("");
    }

    render(VITA_DATA.nutrients);

    document.getElementById("nutrient-search").addEventListener("input", e => {
      const q = e.target.value.toLowerCase();
      render(VITA_DATA.nutrients.filter(n =>
        n.name.toLowerCase().includes(q) || n.role.toLowerCase().includes(q)
      ));
    });
  </script>
</body>
