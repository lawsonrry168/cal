<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>購物車 — VitaPure 純萃</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo"><span class="logo-icon">🌿</span>VitaPure 純萃</a>
      <nav class="nav-desktop">
        <a href="index.html" data-nav>首頁</a>
        <a href="products.html" data-nav>產品目錄</a>
        <a href="cart.html" data-nav>購物車</a>
      </nav>
      <div class="header-actions">
        <a href="cart.html" class="btn-icon" aria-label="購物車">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
          <span class="cart-badge" id="cart-count" style="display:none">0</span>
        </a>
        <button class="btn-icon menu-toggle" id="menu-toggle" aria-label="選單">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
      </div>
    </div>
  </header>

  <div class="page-hero">
    <div class="container">
      <p class="breadcrumb"><a href="index.html">首頁</a> / 購物車</p>
      <h1>購物車</h1>
      <p>滿 NT$ 1,500 享台灣本島免運</p>
    </div>
  </div>

  <section class="section">
    <div class="container cart-layout" id="cart-page">
      <div id="cart-items"></div>
      <div id="cart-summary-wrap"></div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="container footer-bottom">© 2026 VitaPure 純萃</div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    const SHIPPING_FREE = 1500;
    const SHIPPING_FEE = 80;

    function renderCart() {
      const cart = VitaApp.getCart();
      const itemsEl = document.getElementById("cart-items");
      const summaryWrap = document.getElementById("cart-summary-wrap");

      if (cart.length === 0) {
        itemsEl.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <div class="empty-state-icon">🛒</div>
            <h2>購物車是空的</h2>
            <p>快去挑選適合您的補健品吧！</p>
            <a href="products.html" class="btn btn-primary" style="margin-top:1rem">瀏覽產品</a>
            <a href="guide.html" class="btn btn-outline" style="margin-top:0.5rem;margin-left:0.5rem">健康測驗</a>
          </div>`;
        summaryWrap.innerHTML = "";
        return;
      }

      let subtotal = 0;
      itemsEl.innerHTML = cart.map(item => {
        const p = VitaApp.getProduct(item.id);
        if (!p) return "";
        const lineTotal = p.price * item.qty;
        subtotal += lineTotal;
        return `
          <div class="cart-item" data-id="${p.id}">
            <div class="cart-item-img">${p.emoji}</div>
            <div class="cart-item-info">
              <strong>${p.name}</strong>
              <p style="margin:0.25rem 0;font-size:0.85rem;color:var(--text-muted)">${VitaApp.formatPrice(p.price)} / 件</p>
              <div class="qty-control">
                <button type="button" data-action="minus" data-id="${p.id}">−</button>
                <span>${item.qty}</span>
                <button type="button" data-action="plus" data-id="${p.id}">+</button>
                <button type="button" data-action="remove" data-id="${p.id}" style="margin-left:0.5rem;font-size:0.8rem;color:var(--accent);border:none;background:none;cursor:pointer">移除</button>
              </div>
            </div>
            <strong style="font-size:1rem;color:var(--green-700)">${VitaApp.formatPrice(lineTotal)}</strong>
          </div>
        `;
      }).join("");

      const shipping = subtotal >= SHIPPING_FREE ? 0 : SHIPPING_FEE;
      const total = subtotal + shipping;

      summaryWrap.innerHTML = `
        <div class="cart-summary">
          <h3 style="margin:0 0 1rem;color:var(--green-900)">訂單摘要</h3>
          <div class="cart-summary-row"><span>小計</span><span>${VitaApp.formatPrice(subtotal)}</span></div>
          <div class="cart-summary-row"><span>運費</span><span>${shipping === 0 ? "免運" : VitaApp.formatPrice(shipping)}</span></div>
          ${subtotal < SHIPPING_FREE ? `<p style="font-size:0.8rem;color:var(--text-muted);margin:0 0 0.75rem">再消費 ${VitaApp.formatPrice(SHIPPING_FREE - subtotal)} 即可免運</p>` : ""}
          <div class="cart-summary-row total"><span>總計</span><span>${VitaApp.formatPrice(total)}</span></div>
          <button class="btn btn-primary" style="width:100%;margin-top:1rem" id="checkout-btn">前往結帳（示範）</button>
          <a href="products.html" class="btn btn-outline" style="width:100%;margin-top:0.5rem;text-align:center">繼續購物</a>
        </div>
      `;

      itemsEl.querySelectorAll("[data-action]").forEach(btn => {
        btn.addEventListener("click", () => {
          const id = Number(btn.dataset.id);
          let c = VitaApp.getCart();
          const idx = c.findIndex(i => i.id === id);
          if (idx < 0) return;
          if (btn.dataset.action === "plus") c[idx].qty++;
          else if (btn.dataset.action === "minus") {
            c[idx].qty--;
            if (c[idx].qty <= 0) c = c.filter(i => i.id !== id);
          } else c = c.filter(i => i.id !== id);
          VitaApp.saveCart(c);
          renderCart();
        });
      });

      document.getElementById("checkout-btn")?.addEventListener("click", () => {
        VitaApp.showToast("此為示範網站，結帳功能尚未串接金流。");
      });
    }

    renderCart();
  </script>
</body>
</html>
