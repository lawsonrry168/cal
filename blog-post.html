<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章 — VitaPure 純萃</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .article-content { max-width: 680px; margin: 0 auto; line-height: 1.8; color: var(--text-muted); }
    .article-content p { margin-bottom: 1.25rem; }
    .article-meta { font-size: 0.875rem; color: var(--green-500); margin-bottom: 1rem; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo"><span class="logo-icon">🌿</span>VitaPure 純萃</a>
      <nav class="nav-desktop">
        <a href="blog.html" data-nav>保健專欄</a>
        <a href="products.html" data-nav>產品目錄</a>
      </nav>
      <div class="header-actions">
        <a href="cart.html" class="btn-icon" aria-label="購物車">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
          <span class="cart-badge" id="cart-count" style="display:none">0</span>
        </a>
      </div>
    </div>
  </header>

  <article class="section">
    <div class="container" id="article-container">
      <p class="breadcrumb"><a href="index.html">首頁</a> / <a href="blog.html">保健專欄</a> / 文章</p>
    </div>
  </article>

  <footer class="site-footer">
    <div class="container footer-bottom">© 2026 VitaPure 純萃</div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    const id = Number(new URLSearchParams(location.search).get("id"));
    const post = VITA_DATA.blogPosts.find(p => p.id === id);
    const el = document.getElementById("article-container");

    if (!post) {
      el.innerHTML += `<div class="empty-state"><h2>找不到文章</h2><a href="blog.html" class="btn btn-primary">返回專欄</a></div>`;
    } else {
      document.title = `${post.title} — VitaPure 純萃`;
      const paragraphs = post.content.split("。").filter(Boolean).map(s => s.trim() + "。");
      el.innerHTML += `
        <span class="article-meta">${post.date} · ${post.category}</span>
        <h1 style="font-size:clamp(1.5rem,4vw,2rem);color:var(--green-900);margin:0 0 1.5rem">${post.title}</h1>
        <div class="article-content">
          <p style="font-size:1.05rem;color:var(--text);font-weight:500">${post.excerpt}</p>
          ${paragraphs.map(p => `<p>${p}</p>`).join("")}
          <p>想了解更多適合您的補健品？歡迎使用我們的 <a href="guide.html">健康測驗</a> 或瀏覽 <a href="products.html">產品目錄</a>。</p>
        </div>
        <p style="margin-top:2rem"><a href="blog.html" class="btn btn-outline">← 返回專欄列表</a></p>
      `;
    }
  </script>
</body>
</html>
