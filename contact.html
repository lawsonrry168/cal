<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>聯絡我們 — VitaPure 純萃</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo"><span class="logo-icon">🌿</span>VitaPure 純萃</a>
      <nav class="nav-desktop">
        <a href="index.html" data-nav>首頁</a>
        <a href="products.html" data-nav>產品目錄</a>
        <a href="contact.html" data-nav>聯絡我們</a>
      </nav>
      <div class="header-actions">
        <a href="cart.html" class="btn-icon" aria-label="購物車">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
          <span class="cart-badge" id="cart-count" style="display:none">0</span>
        </a>
        <button class="btn-icon menu-toggle" id="menu-toggle" aria-label="選單">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
      </div>
    </div>
  </header>

  <div class="page-hero">
    <div class="container">
      <p class="breadcrumb"><a href="index.html">首頁</a> / 聯絡我們</p>
      <h1>聯絡我們</h1>
      <p>產品諮詢、訂單問題或合作提案，我們將在 1 個工作天內回覆</p>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div class="grid-2" style="gap:2.5rem;align-items:start">
        <div class="card" style="padding:2rem">
          <h2 style="margin-top:0;color:var(--green-900)">填寫表單</h2>
          <form id="contact-form">
            <div class="form-group">
              <label for="name">姓名 *</label>
              <input type="text" id="name" required placeholder="您的姓名">
            </div>
            <div class="form-group">
              <label for="email">電子信箱 *</label>
              <input type="email" id="email" required placeholder="example@email.com">
            </div>
            <div class="form-group">
              <label for="phone">聯絡電話</label>
              <input type="tel" id="phone" placeholder="09xx-xxx-xxx">
            </div>
            <div class="form-group">
              <label for="topic">諮詢類型</label>
              <select id="topic">
                <option>產品諮詢</option>
                <option>訂單與配送</option>
                <option>退換貨</option>
                <option>企業合作</option>
                <option>其他</option>
              </select>
            </div>
            <div class="form-group">
              <label for="message">訊息內容 *</label>
              <textarea id="message" required placeholder="請描述您的問題或需求…"></textarea>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%">送出訊息</button>
          </form>
        </div>
        <div>
          <div class="card" style="padding:1.5rem;margin-bottom:1rem">
            <h3 style="margin:0 0 1rem;color:var(--green-900)">聯絡資訊</h3>
            <p style="margin:0.5rem 0;font-size:0.9rem"><strong>客服專線</strong><br>0800-123-456</p>
            <p style="margin:0.5rem 0;font-size:0.9rem"><strong>電子信箱</strong><br>service@vitapure.tw</p>
            <p style="margin:0.5rem 0;font-size:0.9rem"><strong>服務時間</strong><br>週一至週五 9:00–18:00</p>
          </div>
          <div class="card" style="padding:1.5rem">
            <h3 style="margin:0 0 1rem;color:var(--green-900)">公司地址</h3>
            <p style="margin:0;font-size:0.9rem;color:var(--text-muted)">台北市信義區松仁路 100 號 8 樓<br>（示範地址）</p>
          </div>
          <div class="card feature-card" style="margin-top:1rem">
            <div class="feature-icon">📋</div>
            <h3>常見問題</h3>
            <p>配送、退貨、食用方式等問題，可先查看 FAQ</p>
            <a href="faq.html" class="btn btn-outline btn-sm" style="margin-top:0.75rem">前往 FAQ</a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="container footer-bottom">© 2026 VitaPure 純萃</div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById("contact-form").addEventListener("submit", e => {
      e.preventDefault();
      VitaApp.showToast("感謝您的來信！我們將盡快與您聯繫。");
      e.target.reset();
    });
  </script>
</body>
</html>
