  <div class="page-hero">
    <div class="container">
      <p class="breadcrumb"><a href="index.html">首頁</a> / 產品目錄</p>

      <p>8 款精選補健品，依類別篩選或搜尋，找到最適合您的保健方案</p>
    </div>

  <section class="section">
    <div class="container">
      <div class="search-bar">
        <input type="search" id="search-input" placeholder="搜尋產品名稱或成分…" aria-label="搜尋產品">
        <button class="btn btn-primary" id="search-btn">搜尋</button>
      </div>
      <div class="pills" id="category-pills"></div>
      <p id="result-count" style="font-size:0.875rem;color:var(--text-muted);margin-bottom:1rem"></p>
      <div class="grid-4" id="product-grid"></div>
      <div class="empty-state" id="no-results" style="display:none">
        <div class="empty-state-icon">🔍</div>
        <p>找不到符合條件的產品，請嘗試其他關鍵字或分類</p>
      </div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-grid">
        <div><div class="logo" style="color:white;margin-bottom:1rem"><span class="logo-icon">🌿</span>VitaPure 純萃</div></div>
        <div><h4>產品與服務</h4><a href="products.html">產品目錄</a><a href="guide.html">健康測驗</a></div>

    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    let activeCategory = "all";
    let searchQuery = "";

    const params = new URLSearchParams(location.search);
    if (params.get("cat")) activeCategory = params.get("cat");

    const pillsEl = document.getElementById("category-pills");
    pillsEl.innerHTML = VITA_DATA.categories.map(cat => `
      <button class="pill ${cat.id === activeCategory ? "active" : ""}" data-cat="${cat.id}">${cat.name}</button>
    `).join("");

    function filterProducts() {
      return VITA_DATA.products.filter(p => {
        const matchCat = activeCategory === "all" || p.category === activeCategory;
        const q = searchQuery.toLowerCase();
        const matchSearch = !q || p.name.toLowerCase().includes(q) ||
          p.desc.toLowerCase().includes(q) || p.ingredients.toLowerCase().includes(q);
        return matchCat && matchSearch;
      });
    }

    function render() {
      const list = filterProducts();
      const grid = document.getElementById("product-grid");
      const noResults = document.getElementById("no-results");
      document.getElementById("result-count").textContent = `共 ${list.length} 項產品`;

      if (list.length === 0) {
        grid.innerHTML = "";
        noResults.style.display = "block";
      } else {
        noResults.style.display = "none";
        grid.innerHTML = list.map(p => VitaApp.renderProductCard(p)).join("");
        VitaApp.bindAddToCart(grid);
      }
    }

    pillsEl.addEventListener("click", e => {
      if (!e.target.classList.contains("pill")) return;
      activeCategory = e.target.dataset.cat;
      pillsEl.querySelectorAll(".pill").forEach(p => p.classList.toggle("active", p.dataset.cat === activeCategory));
      render();
    });

    document.getElementById("search-btn").addEventListener("click", () => {
      searchQuery = document.getElementById("search-input").value.trim();
      render();
    });
    document.getElementById("search-input").addEventListener("keydown", e => {
      if (e.key === "Enter") { searchQuery = e.target.value.trim(); render(); }
    });

    render();
  </script>
</body>
