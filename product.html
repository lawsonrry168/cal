<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>產品詳情 — VitaPure 純萃</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo"><span class="logo-icon">🌿</span>VitaPure 純萃</a>
      <nav class="nav-desktop">
        <a href="index.html" data-nav>首頁</a>
        <a href="products.html" data-nav>產品目錄</a>
        <a href="guide.html" data-nav>健康測驗</a>
        <a href="nutrition.html" data-nav>營養百科</a>
        <a href="blog.html" data-nav>保健專欄</a>
        <a href="about.html" data-nav>關於我們</a>
      </nav>
      <div class="header-actions">
        <a href="cart.html" class="btn-icon" aria-label="購物車">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
          <span class="cart-badge" id="cart-count" style="display:none">0</span>
        </a>
        <button class="btn-icon menu-toggle" id="menu-toggle" aria-label="選單">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
      </div>
      <nav class="nav-mobile" id="nav-mobile">
        <a href="index.html" data-nav>首頁</a>
        <a href="products.html" data-nav>產品目錄</a>
        <a href="guide.html" data-nav>健康測驗</a>
        <a href="contact.html" data-nav>聯絡我們</a>
      </nav>
    </div>
  </header>

  <main class="container" id="product-main">
    <p class="breadcrumb" style="padding-top:1.5rem"><a href="index.html">首頁</a> / <a href="products.html">產品目錄</a> / <span id="breadcrumb-name">載入中…</span></p>
    <div class="product-detail-grid" id="product-content"></div>
    <section class="section">
      <div class="section-header">
        <h2>相關推薦</h2>
      </div>
      <div class="grid-4" id="related-products"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-bottom">© 2026 VitaPure 純萃</div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    const id = Number(new URLSearchParams(location.search).get("id"));
    const product = VitaApp.getProduct(id);

    if (!product) {
      document.getElementById("product-content").innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <div class="empty-state-icon">😕</div>
          <h2>找不到此產品</h2>
          <a href="products.html" class="btn btn-primary" style="margin-top:1rem">返回產品目錄</a>
        </div>`;
    } else {
      document.title = `${product.name} — VitaPure 純萃`;
      document.getElementById("breadcrumb-name").textContent = product.name;

      const catName = VITA_DATA.categories.find(c => c.id === product.category)?.name || "";
      const oldPrice = product.originalPrice ? `<span class="price-old">${VitaApp.formatPrice(product.originalPrice)}</span>` : "";
      const tag = product.tag ? `<span class="product-tag" style="position:static;display:inline-block;margin-bottom:0.5rem">${product.tag}</span>` : "";

      document.getElementById("product-content").innerHTML = `
        <div class="product-gallery">${product.emoji}</div>
        <div class="product-detail-info">
          ${tag}
          <h1>${product.name}</h1>
          <p class="rating">★ ${product.rating} · ${product.reviews} 則評價 · ${catName}</p>
          <div class="product-price" style="margin:1rem 0">
            <span class="price-current" style="font-size:1.75rem">${VitaApp.formatPrice(product.price)}</span>
            ${oldPrice}
          </div>
          <p>${product.desc}</p>
          <ul class="spec-list">
            <li><span>主要成分</span><span>${product.ingredients}</span></li>
            <li><span>建議用法</span><span>${product.usage}</span></li>
          </ul>
          <div style="display:flex;gap:0.75rem;flex-wrap:wrap;margin-top:1.5rem">
            <button class="btn btn-primary" id="add-cart-btn">加入購物車</button>
            <a href="guide.html" class="btn btn-outline">不確定？做健康測驗</a>
          </div>
        </div>
        <div style="grid-column:1/-1">
          <div class="tabs">
            <button class="tab-btn active" data-tab="desc">產品說明</button>
            <button class="tab-btn" data-tab="benefits">功效特色</button>
            <button class="tab-btn" data-tab="usage">食用方式</button>
          </div>
          <div class="tab-panel active" id="tab-desc">
            <p>${product.desc}</p>
            <p style="margin-top:1rem">本產品於 GMP 認證工廠生產，每批次均通過 SGS 食品檢驗。不含人工色素、防腐劑及不必要的填充物。</p>
          </div>
          <div class="tab-panel" id="tab-benefits">
            <ul>${product.benefits.map(b => `<li>${b}</li>`).join("")}</ul>
          </div>
          <div class="tab-panel" id="tab-usage">
            <p><strong>建議用量：</strong>${product.usage}</p>
            <p style="margin-top:0.75rem">※ 孕婦、哺乳期婦女及正在服藥者，請先諮詢醫師。兒童請在成人監護下使用。</p>
          </div>
        </div>
      `;

      document.getElementById("add-cart-btn").addEventListener("click", () => VitaApp.addToCart(product.id));

      document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
          document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
          btn.classList.add("active");
          document.getElementById("tab-" + btn.dataset.tab).classList.add("active");
        });
      });

      const related = VITA_DATA.products.filter(p => p.id !== product.id && p.category === product.category).slice(0, 4);
      const relEl = document.getElementById("related-products");
      relEl.innerHTML = (related.length ? related : VITA_DATA.products.filter(p => p.id !== product.id).slice(0, 4))
        .map(p => VitaApp.renderProductCard(p)).join("");
      VitaApp.bindAddToCart(relEl);
    }
  </script>
</body>
</html>
