<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>保健專欄 — VitaPure 純萃</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo"><span class="logo-icon">🌿</span>VitaPure 純萃</a>
      <nav class="nav-desktop">
        <a href="index.html" data-nav>首頁</a>
        <a href="products.html" data-nav>產品目錄</a>
        <a href="guide.html" data-nav>健康測驗</a>
        <a href="nutrition.html" data-nav>營養百科</a>
        <a href="blog.html" data-nav>保健專欄</a>
        <a href="about.html" data-nav>關於我們</a>
      </nav>
      <div class="header-actions">
        <a href="cart.html" class="btn-icon" aria-label="購物車">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
          <span class="cart-badge" id="cart-count" style="display:none">0</span>
        </a>
        <button class="btn-icon menu-toggle" id="menu-toggle" aria-label="選單">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
      </div>
      <nav class="nav-mobile" id="nav-mobile">
        <a href="blog.html" data-nav>保健專欄</a>
      </nav>
    </div>
  </header>

  <div class="page-hero">
    <div class="container">
      <p class="breadcrumb"><a href="index.html">首頁</a> / 保健專欄</p>
      <h1>保健專欄</h1>
      <p>由營養師與保健編輯撰寫的專業文章，幫助您建立正確的保健知識</p>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div class="pills" id="blog-filters">
        <button class="pill active" data-filter="all">全部</button>
        <button class="pill" data-filter="保健知識">保健知識</button>
        <button class="pill" data-filter="營養科學">營養科學</button>
        <button class="pill" data-filter="運動營養">運動營養</button>
        <button class="pill" data-filter="腸道保健">腸道保健</button>
      </div>
      <div class="grid-2" id="blog-grid"></div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="container footer-bottom">© 2026 VitaPure 純萃</div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    let filter = "all";
    const grid = document.getElementById("blog-grid");

    function render() {
      const posts = filter === "all"
        ? VITA_DATA.blogPosts
        : VITA_DATA.blogPosts.filter(p => p.category === filter);
      grid.innerHTML = posts.map(post => `
        <article class="card blog-card">
          <div class="card-body">
            <span class="blog-date">${post.date} · ${post.category}</span>
            <h3>${post.title}</h3>
            <p>${post.excerpt}</p>
            <a href="blog-post.html?id=${post.id}" class="btn btn-primary btn-sm">閱讀全文</a>
          </div>
        </article>
      `).join("");
    }

    document.getElementById("blog-filters").addEventListener("click", e => {
      if (!e.target.classList.contains("pill")) return;
      filter = e.target.dataset.filter;
      document.querySelectorAll("#blog-filters .pill").forEach(p =>
        p.classList.toggle("active", p.dataset.filter === filter)
      );
      render();
    });

    render();
  </script>
</body>
</html>
